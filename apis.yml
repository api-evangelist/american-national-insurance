name: American National Insurance
description: >-
  American National Insurance Company is a multi-line insurance holding company founded
  in 1905 and headquartered in Galveston, Texas. The company offers life insurance,
  annuities, pension risk transfer, health insurance, and property and casualty insurance
  through multiple subsidiary companies operating in all 50 states. American National holds
  A-level ratings from A.M. Best, Fitch, and S&P.
